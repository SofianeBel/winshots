<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; img-src 'self' file: data:; style-src 'self'; script-src 'self';" />
    <title>Winshots</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <div class="titlebar-left">
          <span class="app-mark" aria-hidden="true"></span>
          <strong>Winshots</strong>
        </div>
        <div class="window-controls" aria-label="Window controls">
          <button type="button" class="window-button" data-window-action="minimize" aria-label="Minimize">
            <span></span>
          </button>
          <button type="button" class="window-button" data-window-action="maximize" aria-label="Maximize">
            <span></span>
          </button>
          <button type="button" class="window-button close" data-window-action="close" aria-label="Close">
            <span></span>
          </button>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar" aria-label="Winshots navigation">
          <section class="brand-row">
            <button class="icon-button" type="button" aria-label="Toggle sidebar" aria-pressed="false" data-sidebar-toggle data-icon="menu"></button>
            <strong>Winshots</strong>
          </section>

          <section class="nav-section" aria-label="Primary sections">
            <button class="nav-item active" type="button" data-filter="all">
              <span class="nav-icon" data-icon="capture"></span>
              <span>Captures</span>
            </button>
            <button class="nav-item" type="button" data-filter="codex">
              <span class="nav-icon" data-icon="codex"></span>
              <span>Codex-ready</span>
            </button>
            <button class="nav-item" type="button" data-filter="context">
              <span class="nav-icon" data-icon="context"></span>
              <span>With context</span>
            </button>
            <button class="nav-item" type="button" data-filter="images">
              <span class="nav-icon" data-icon="image"></span>
              <span>Images</span>
            </button>
          </section>

          <section class="sidebar-group">
            <div class="sidebar-heading">
              <span>Projects</span>
            </div>
            <div id="project-list" class="project-list"></div>
          </section>

          <section class="sidebar-group recent-group">
            <div class="sidebar-heading">
              <span>Recent</span>
            </div>
            <div id="recent-list" class="recent-list"></div>
          </section>

          <section class="sidebar-footer">
            <div class="footer-tools">
              <button class="icon-button" type="button" aria-label="Toggle theme" aria-pressed="false" data-theme-toggle data-icon="theme"></button>
              <button class="icon-button" type="button" aria-label="Settings" data-settings-open data-icon="settings"></button>
            </div>
            <p><span class="status-dot"></span><span id="sync-status">Loading captures...</span></p>
          </section>
        </aside>

        <main class="content">
          <section class="content-head">
            <div>
              <div class="capture-title">
                <h1 id="capture-set-title">Winshots captures</h1>
              </div>
              <div class="metrics-row" id="summary-metrics"></div>
            </div>
            <div class="head-actions">
              <div class="command-tools" aria-label="Winshots commands">
                <button type="button" class="command-button primary" data-command="capture">
                  <span data-icon="capture"></span>
                  <span>Capture</span>
                </button>
                <button type="button" class="command-button" data-command="capture-codex">
                  <span data-icon="codex"></span>
                  <span>To Codex</span>
                </button>
                <button type="button" class="command-button" data-command="timeline" aria-pressed="false">
                  <span data-icon="timeline"></span>
                  <span>Timeline</span>
                </button>
                <button type="button" class="command-button" data-command="session" aria-pressed="false">
                  <span data-icon="session"></span>
                  <span>Session</span>
                </button>
                <label class="interval-control" aria-label="Capture interval in seconds">
                  <input type="number" min="5" max="3600" step="1" value="60" data-interval-seconds />
                  <span>s</span>
                </label>
              </div>
              <div class="view-tools">
                <button type="button" class="segmented active" aria-label="List view" aria-pressed="true" data-view-mode="list" data-icon="list"></button>
                <button type="button" class="segmented" aria-label="Grid view" aria-pressed="false" data-view-mode="grid" data-icon="grid"></button>
              </div>
            </div>
          </section>

          <section class="table-panel" aria-label="Capture list">
            <div class="capture-table" role="table" aria-label="Local captures">
              <div class="capture-row table-head" role="row">
                <span role="columnheader">#</span>
                <span role="columnheader">Preview</span>
                <span role="columnheader">Title</span>
                <span role="columnheader">Time</span>
                <span role="columnheader">Duration</span>
                <span role="columnheader">Labels</span>
              </div>
              <div id="capture-rows" class="capture-rows"></div>
            </div>
            <div class="table-status">
              <span id="capture-count">0 captures</span>
              <label class="checkbox-label">
                <span>Auto-scroll</span>
                <input type="checkbox" data-auto-scroll checked />
              </label>
            </div>
          </section>
        </main>

        <aside class="inspector" aria-label="Capture inspector">
          <header class="inspector-head">
            <h2>Inspector</h2>
          </header>

          <section class="inspector-body" id="inspector-body"></section>
        </aside>
      </div>
    </div>

    <div class="settings-modal" data-settings-modal hidden>
      <button type="button" class="preview-backdrop" aria-label="Close settings" data-settings-close></button>
      <section class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <header class="settings-head">
          <div>
            <h2 id="settings-title">Settings</h2>
            <p data-settings-mode>Checking package...</p>
          </div>
          <button type="button" class="icon-button" aria-label="Close settings" data-settings-close data-icon="close"></button>
        </header>
        <div class="settings-body">
          <section class="settings-section">
            <h3>Package</h3>
            <div class="settings-rows" data-settings-package></div>
          </section>
          <section class="settings-section">
            <h3>Launcher</h3>
            <p class="settings-copy" data-settings-launcher></p>
          </section>
          <section class="settings-section">
            <h3>Local install</h3>
            <p class="settings-copy" data-settings-install-copy></p>
            <div class="settings-actions">
              <button type="button" class="command-button primary" data-settings-action="install-local">Install locally</button>
              <button type="button" class="command-button" data-settings-action="open-package">Open package folder</button>
            </div>
          </section>
        </div>
      </section>
    </div>

    <div class="preview-modal" data-preview-modal hidden>
      <button type="button" class="preview-backdrop" aria-label="Close preview" data-preview-close></button>
      <section class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="preview-title">
        <header class="preview-head">
          <div>
            <h2 id="preview-title">Capture preview</h2>
            <p id="preview-meta"></p>
          </div>
          <button type="button" class="icon-button" aria-label="Close preview" data-preview-close data-icon="close"></button>
        </header>
        <div class="preview-stage">
          <img id="preview-image" alt="" />
        </div>
        <footer class="preview-actions">
          <button type="button" class="action-row" data-modal-action="copy-image"></button>
          <button type="button" class="action-row" data-modal-action="copy-path"></button>
          <button type="button" class="action-row" data-modal-action="open-folder"></button>
        </footer>
      </section>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
